name: Chart label cleanup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('src/template.html')
          s = p.read_text(encoding='utf-8')

          m = re.search(r'<title>Markets — LT agencies · v0\.2\.(\d+)</title>', s)
          if not m:
              raise SystemExit('current title version not found')
          old_patch = int(m.group(1))
          new_ver = f'v0.2.{old_patch + 1}'
          old_ver = f'v0.2.{old_patch}'
          s = s.replace(f'<title>Markets — LT agencies · {old_ver}</title>', f'<title>Markets — LT agencies · {new_ver}</title>', 1)
          s = re.sub(r'<span class="nav-version" id="navVersion">v0\.2\.\d+</span>', f'<span class="nav-version" id="navVersion">{new_ver}</span>', s, count=1)

          old_pal = "const CMP_PAL=['--accent','--green','--amber','--purple','--red','--gold','--muted'];"
          new_pal = "const CMP_PAL=['--accent','--purple','--amber','--red','--green','--gold','--muted'];"
          if old_pal in s:
              s = s.replace(old_pal, new_pal, 1)
          elif new_pal not in s:
              raise SystemExit('compare palette line not found')

          start = s.index('  const rows=[];\n  rankMetricSpecs.forEach(spec=>{')
          end = s.index('  else clearChart(chMineRank);', start)
          new_chunk = """  const rows=[];
  rankMetricSpecs.forEach(spec=>{
    const metricRows=[];
    (grouped?cmpList:[brand]).forEach(b=>{
      const r=rankOf(spec.fn, (byBrand[b]&&byBrand[b][coYear])||{});
      if(!r) return;
      metricRows.push({ label: spec.label, value:r.pct,
        color: grouped ? coBrandColor(b) : (r.pct>=50?cssVar('--gold-rank'):cssVar('--muted')),
        pos:r.pos, total:r.total, metric:spec.label, metricLabel:spec.label, brand:b });
    });
    // Grouped mode: write each metric once; company identity is colour + tooltip.
    metricRows.forEach((r,i)=>rows.push(Object.assign({}, r, { label: grouped ? (i===0 ? spec.label : '') : spec.label })));
  });
  const rankBox=document.getElementById('chMineRankBox');
  if(rankBox) rankBox.style.height = Math.max(200, 44 + rows.length*(grouped?26:32))+'px';   // grow with grouped bars
  if(rows.length) drawBarsSvg(chMineRank, {
    rows,
    xTitle:'Percentile vs '+BRANDS.length+' agencies (100 = top)', fmt:v=>Math.round(v),
    tip:r=>`<b>${esc(String(r.metricLabel||r.metric||r.label))}${grouped&&r.brand?' · '+esc(r.brand):''}</b>: ${Math.round(r.value)}th percentile · #${r.pos} of ${r.total}`
  });
"""
          s = s[:start] + new_chunk + s[end:]

          entry = f"""const VERSIONS = [
  {{v:'{new_ver}', date:'2026-07-11', sp:1, title:'Cleaner company-vs-market labels',
    desc:'Grouped company-vs-market now uses one metric label per group and more distinct company colours.',
    detail:'Removed repeated Metric - Company labels from the percentile chart. In grouped mode only the metric name is written once; company identity is carried by chip-matched bar colour and tooltip. Reordered the compare palette so the first two selected companies are teal and purple instead of two similar green tones.'}},"""
          s = s.replace('const VERSIONS = [', entry, 1)

          p.write_text(s, encoding='utf-8')
          Path('.github/workflows/zz-chart-label-cleanup.yml').unlink(missing_ok=True)
          Path('.github/workflows/patch-company-vs-market-labels.yml').unlink(missing_ok=True)
          Path('.chart-label-cleanup-trigger').unlink(missing_ok=True)
          PY
          python3 src/build_site.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/template.html index.html .github/workflows/zz-chart-label-cleanup.yml .github/workflows/patch-company-vs-market-labels.yml .chart-label-cleanup-trigger
          git diff --cached --quiet && exit 0
          git commit -m "v83 UI-01 | Clean company vs market chart labels | 1 sp"
          git push
