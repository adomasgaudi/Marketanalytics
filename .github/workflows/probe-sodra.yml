name: Probe Sodra (temporary)

# Throwaway diagnostic: the refresh Action gets 403 from the runner while the same
# request returns 200 from the owner's machine. Distinguish UA-block vs IP/geo-block.
# Delete this file once the answer is recorded.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Where are we
        run: curl -s https://ipinfo.io/json | head -c 300; echo

      - name: Try several User-Agents
        run: |
          U="https://atvira.sodra.lt/imones-rest/solr/page?text=124099127&start=0&size=20"
          probe() {
            printf '%-22s -> ' "$1"
            curl -s -o /tmp/b -w 'HTTP %{http_code}  %{size_download}b\n' -A "$2" "$U" || echo "curl failed"
          }
          probe "curl-default"  "curl/8.0"
          probe "our-UA"        "Mozilla/5.0 (compatible; marketanalytics.lt data refresh)"
          probe "real-chrome"   "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          echo "--- body of last attempt (first 400 chars) ---"
          head -c 400 /tmp/b; echo

      - name: Chrome UA + browser-ish headers
        run: |
          U="https://atvira.sodra.lt/imones-rest/solr/page?text=124099127&start=0&size=20"
          curl -s -o /tmp/c -w 'HTTP %{http_code}  %{size_download}b\n' \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: lt-LT,lt;q=0.9,en;q=0.8" \
            -H "Referer: https://atvira.sodra.lt/imones/" \
            -H "X-Requested-With: XMLHttpRequest" \
            "$U"
          head -c 400 /tmp/c; echo

      - name: Plain homepage (is the whole host blocked?)
        run: curl -s -o /dev/null -w 'homepage HTTP %{http_code}\n' https://atvira.sodra.lt/
